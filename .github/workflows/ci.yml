name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node -e "const f = require('./src/main.js'); if (typeof f.greet !== 'function') process.exit(1)"
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node -e "const f = require('./src/main.js'); const r = f.greet('world'); if (r !== 'Hello, world!') process.exit(1)"
      - run: node tests/math.test.js
